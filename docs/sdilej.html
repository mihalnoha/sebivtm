<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sdílej - ŠebiVTM</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .share-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .share-card-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, opacity 0.2s;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .share-card-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .share-copy { background: #1976D2; }
        .share-system { background: #E040FB; }
        
        .status-msg {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #2E7D32;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Globální navigace -->
    <nav class="navbar" id="globalNavbar"></nav>

    <div class="container">

        <div class="card">
            <h1>📢 Pošli odkaz kamarádům</h1>
            <p class="subtitle">Pomoz nám rozšířit info o memoriálu dál.</p>
        </div>

        <div class="share-container">
            
            <!-- Tlačítko pro mobilní telefony -->
            <button onclick="systemShare()" id="systemShareBtn" class="share-card-btn share-system" style="display: none;">
                📱 Sdílet přes telefon
            </button>

            <!-- Kopírovat odkaz -->
            <button onclick="copyLink()" class="share-card-btn share-copy">
                🔗 Zkopírovat odkaz
            </button>

        </div>

        <div id="copyStatus" class="status-msg">✅ Odkaz byl zkopírován do schránky!</div>

    </div>

    <script src="js/menu.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Pevně definovaná správná URL adresa
        const shareUrl = 'https://mihalnoha.github.io/sebivtm/index.html';
        const shareText = 'Ahoj, mrkni na stránky cyklistického memoriálu ŠebiVTM! 🚴';

        // Funkce pro zkopírování odkazu
        function copyLink() {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(shareUrl).then(showStatus).catch(fallbackCopy);
            } else {
                fallbackCopy();
            }

            function fallbackCopy() {
                var textArea = document.createElement("textarea");
                textArea.value = shareUrl;
                textArea.style.position = "fixed"; 
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showStatus();
                } catch (err) {
                    console.error('Chyba při kopírování', err);
                }
                document.body.removeChild(textArea);
            }

            function showStatus() {
                const status = document.getElementById('copyStatus');
                status.style.display = 'block';
                setTimeout(() => {
                    status.style.display = 'none';
                }, 3000);
            }
        }

        // Aktivace systémového sdílení na mobilech
        if (navigator.share) {
            document.getElementById('systemShareBtn').style.display = 'flex';
        }

        function systemShare() {
            navigator.share({
                title: 'Memoriál ŠebiVTM',
                text: shareText,
                url: shareUrl
            }).catch(console.error);
        }
    </script>
</body>
</html>
