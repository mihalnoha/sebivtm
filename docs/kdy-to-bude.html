<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">🚴 ŠebiVTM</div>
        <button class="nav-toggle" onclick="toggleMenu()">☰</button>
        <ul class="nav-menu" id="navMenu">
            <li><a href="index.html">🏠 Domů</a></li>
            <li><a href="sraz.html">📍 Sraz</a></li>
            <li><a href="trasa.html">🚴 Trasa</a></li>
            <li><a href="kdy-to-bude.html" class="active">📅 Kdy to bude</a></li>
            <li><a href="pravidla.html">📋 Pravidla</a></li>
            <li><a href="kontakt.html">📞 Kontakt</a></li>
        </ul>
    </nav>

    <div class="container">

        <h1 style="text-align: center; color: #1976D2;">ŠebiVTM Memoriál</h1>

        <!-- Info karta -->
        <div class="card">
            <h2 style="color: #1976D2; text-align: center;">📅 PRVNÍ SOBOTA V ČERVNU</h2>
            <p style="text-align: center; font-size: 18px;">🕐 Start ve 13:00h</p>
            <p style="text-align: center; font-size: 18px;">📍 Prachov 37, Holín - Prachov</p>
        </div>

        <!-- Nejbližší datum -->
        <div class="card">
            <h2 style="text-align: center; color: #1976D2;">📅 Nejbližší ročník</h2>
            <p id="nejblizsiDatum" style="text-align: center; font-size: 22px; font-weight: bold; color: #333333;"></p>
            <p id="odpocet" style="text-align: center; font-size: 18px; color: #555555;"></p>
        </div>

        <!-- Tip karta -->
        <div class="card" style="background: #FFF9C4;">
            <p style="text-align: center; font-size: 15px; color: #555555;">
                💡 Ulož si datum do kalendáře!
            </p>
        </div>

    </div>

    <script src="js/main.js"></script>
    <script>
        // Výpočet první soboty v červnu
        function getFirstSaturday(year) {
            var date = new Date(year, 5, 1); // Červen
            while (date.getDay() !== 6) {
                date.setDate(date.getDate() + 1);
            }
            return date;
        }

        var now = new Date();
        var year = now.getFullYear();
        var firstSaturday = getFirstSaturday(year);

        if (now > firstSaturday) {
            firstSaturday = getFirstSaturday(year + 1);
        }

        var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('nejblizsiDatum').textContent =
            firstSaturday.toLocaleDateString('cs-CZ', options);

        var diff = firstSaturday - now;
        var days = Math.ceil(diff / (1000 * 60 * 60 * 24));
        document.getElementById('odpocet').textContent = 'Za ' + days + ' dní';
    </script>
</body>
</html>
