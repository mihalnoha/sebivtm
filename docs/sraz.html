<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sraz - ŠebiVTM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
<nav class="navbar" id="globalNavbar"></nav>
      <div class="container">

        <!-- Info panel -->
        <div class="card">
            <h2 style="color: #1976D2; text-align: center;">📍 Místo srazu</h2>
            <p style="text-align: center; color: #333333;">U Speedyho Gonzalese · Prachov 37</p>
        </div>

        <!-- Mapa -->
        <div class="card">
            <div id="mapSraz" style="height: 400px; border-radius: 8px;"></div>
        </div>

        <!-- Tlačítka vytažená pod mapu s plně funkčními a přesnými navigacemi -->
        <div class="card" style="text-align: center;">
            <b style="display:block; margin-bottom: 12px; font-size: 16px; color: #333;">🗺️ Spustit navigaci na místo srazu:</b>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <a href="https://google.com" target="_blank" style="display: block; background: #4285F4; color: white; text-decoration: none; padding: 14px; border-radius: 24px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 10px rgba(66,133,244,0.3);">
                    🌐 Navigovat přes Google Mapy
                </a>
                <a href="https://mapy.cz" target="_blank" style="display: block; background: #F81E1E; color: white; text-decoration: none; padding: 14px; border-radius: 24px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 10px rgba(248,30,30,0.3);">
                    🗺️ Navigovat přes Mapy.cz
                </a>
            </div>
        </div>

    </div>

    <!-- Patička webu -->
    <footer class="footer">
        © 2026 Mihal Noha. Všechna práva vyhrazena.
    </footer>

    <script src="https://unpkg.com"></script>
    <script src="js/menu.js"></script>
    <script src="js/main.js"></script>
    <script>
        var srazCoords = [50.465403, 15.306016];

        // Čistá a stabilní inicializace mapy
        var map = L.map('mapSraz', {
            zoomControl: false
        }).setView(srazCoords, 15);

        L.control.zoom({
            position: 'bottomright'
        }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // BEZPEČNÝ ZÁPIS IKONY: Rozměry předány jako textové řetězce, což prohlížeč přelouská bez chyb
        var bikeIcon = L.divIcon({
            html: '<div style="background: #1976D2; border: 2px solid #FFDF79; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">🚴</div>',
            className: 'custom-bike-marker',
            iconSize: "40",
            iconAnchor: "20"
        });

        // Přidání markeru na mapu s otevíracím popupem
        L.marker(srazCoords, { icon: bikeIcon })
            .addTo(map)
            .bindPopup('<b>U SPEEDYHO GONZALESE</b><br>Prachov 37')
            .openPopup();
    </script>
</body>
</html>

</body>
</html>
