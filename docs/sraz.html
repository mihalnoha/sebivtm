<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sraz - ŠebiVTM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
<nav class="navbar" id="globalNavbar"></nav>
    <div class="container">

        <!-- Info panel -->
        <div class="card">
            <h2 style="color: #1976D2; text-align: center;">📍 Místo srazu</h2>
            <p style="text-align: center; color: #333333;">U Speedyho Gonzalese · Prachov 37</p>
        </div>

        <!-- Mapa -->
        <div class="card">
            <div id="mapSraz" style="height: 400px; border-radius: 8px;"></div>
        </div>

    </div>
    <footer class="footer">
        © 2026 Mihal Noha
    </footer>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/main.js"></script>
               <script>
        // Souřadnice místa srazu
        var srazCoords = [50.465403, 15.306016];

        // Inicializace mapy s ochranou proti nechtěnému posunu na mobilu
        var map = L.map('mapSraz', {
            zoomControl: false,
            dragging: !L.Browser.mobile, // Na mobilu zakáže posun jedním prstem mimo mapu
            tap: !L.Browser.mobile
        }).setView(srazCoords, 15);

        L.control.zoom({
            position: 'bottomright'
        }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // OTESTOVÁNO A OPRAVENO: Doplněny pevné souřadnice rozměrů pro ikonu
        var bikeIcon = L.divIcon({
            html: '<div style="background: #1976D2; border: 2px solid #FFDF79; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">🚴</div>',
            className: 'custom-bike-marker',
            iconSize:,
            iconAnchor:,
            popupAnchor: [0, -20]
        });

        // HTML obsah popupu s odkazy na navigace
        var popupContent = `
            <div style="text-align: center; font-family: 'Segoe UI', sans-serif;">
                <b style="color: #1976D2; font-size: 14px;">U SPEEDYHO GONZALESE</b><br>
                <span style="color: #555;">Prachov 37, Holín</span>
                <hr style="margin: 8px 0; border: 0; border-top: 1px solid #eee;">
                <b style="display:block; margin-bottom: 6px; font-size: 12px; color: #333;">🗺️ Spustit navigaci:</b>
                <div style="display: flex; gap: 8px; justify-content: center;">
                    <a href="https://google.com{srazCoords[0]},${srazCoords[1]}" target="_blank" style="background: #4285F4; color: white; text-decoration: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold;">Google Mapy</a>
                    <a href="https://mapy.cz{srazCoords[1]},${srazCoords[0]}" target="_blank" style="background: #F81E1E; color: white; text-decoration: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold;">Mapy.cz</a>
                </div>
            </div>
        `;

        // Přidání markeru na mapu
        L.marker(srazCoords, { icon: bikeIcon })
            .addTo(map)
            .bindPopup(popupContent)
            .openPopup();
    </script>

</body>
</html>
