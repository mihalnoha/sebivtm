<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sraz - ŠebiVTM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com"/>
</head>
<body>

    <!-- Globální navigace -->
    <nav class="navbar" id="globalNavbar"></nav>

    <div class="container">

        <!-- Info panel -->
        <div class="card">
            <h2 style="color: #1976D2; text-align: center;">📍 Místo srazu</h2>
            <p style="text-align: center; color: #333333;">U Speedyho Gonzalese · Prachov 37</p>
        </div>

        <!-- Mapa -->
        <div class="card">
            <div id="mapSraz" style="height: 400px; border-radius: 8px;"></div>
        </div>

        <!-- Tlačítka pod mapou -->
        <div class="card" style="text-align: center;">
            <b style="display:block; margin-bottom: 12px; font-size: 16px; color: #333;">🗺️ Spustit navigaci na místo srazu:</b>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <a id="btnGoogle" href="#" target="_blank" style="display: block; background: #4285F4; color: white; text-decoration: none; padding: 14px; border-radius: 24px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 10px rgba(66,133,244,0.3);">
                    🌐 Navigovat přes Google Mapy
                </a>
                <a id="btnMapyCz" href="#" target="_blank" style="display: block; background: #F81E1E; color: white; text-decoration: none; padding: 14px; border-radius: 24px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 10px rgba(248,30,30,0.3);">
                    🗺️ Navigovat přes Mapy.cz
                </a>
            </div>
        </div>

    </div>

    <!-- Patička webu -->
    <footer class="footer">
        © 2026 Mihal Noha. Všechna práva vyhrazena.
    </footer>

    <script src="https://unpkg.com"></script>
    <script src="js/menu.js"></script>
    <script src="js/main.js"></script>
    <script>
        // JISTOTA PRO ODKAZY: Absolutně neprůstřelné vložení adres, které systém neumí zkomolit
        var rawGoogle = "https:%2F%://google.com%2Fmaps%2Fdir%2F%3Fapi%3D1%26destination%3D50.465403,15.306016";
        var rawMapyCz = "https:%2F%2Fmapy.cz%2Fzakladni%3Fvlastni-body%26x%3D15.306016%26y%3D50.465403%26z%3D16%26ut%3DU%20Speedyho%20Gonzalese";
        
        document.getElementById("btnGoogle").href = decodeURIComponent(rawGoogle);
        document.getElementById("btnMapyCz").href = decodeURIComponent(rawMapyCz);

        // JISTOTA PRO MAPU: Inicializace souřadnic bez rizika smazání závorek
        var lat = 50.465403;
        var lng = 15.306016;

        var map = L.map('mapSraz', {
            zoomControl: false
        }).setView(L.latLng(lat, lng), 15);

        L.control.zoom({
            position: 'bottomright'
        }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Zobrazení standardního modrého špendlíku přímo na souřadnicích startu
        var marker = L.marker(L.latLng(lat, lng)).addTo(map);
        marker.bindPopup('<b>U SPEEDYHO GONZALESE</b><br>Prachov 37, Holín - Prachov').openPopup();
    </script>
</body>
</html>
